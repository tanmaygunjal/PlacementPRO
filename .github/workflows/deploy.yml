name: PlacementPRO Production Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-backend:
    name: Backend Unit Testing Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Pytest Tests
        env:
          # In-memory testing configurations
          ENV: testing
          JWT_SECRET_KEY: test_secret_key_value_here
        run: |
          PYTHONPATH=backend pytest

  deploy-backend:
    name: Build & Deploy Backend (GCP Cloud Run)
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/placementpro/backend:${{ github.sha }}"
          docker build -t $IMAGE_TAG -f backend/Dockerfile .
          docker push $IMAGE_TAG

      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: placementpro-backend
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/placementpro/backend:${{ github.sha }}
          region: us-central1
          env_vars: |
            DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
            JWT_SECRET_KEY=${{ secrets.PROD_JWT_SECRET_KEY }}
            SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.PROD_SUPABASE_KEY }}
            OPENAI_API_KEY=${{ secrets.PROD_OPENAI_API_KEY }}
            ALLOWED_ORIGINS=https://${{ secrets.VERCEL_PROJECT_NAME }}.vercel.app

  deploy-frontend:
    name: Build & Deploy Frontend (Vercel)
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vite Production Bundles
        working-directory: frontend
        env:
          VITE_API_URL: https://placementpro-backend-yourinstance.a.run.app/api
        run: npm run build

      - name: Deploy static files to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
